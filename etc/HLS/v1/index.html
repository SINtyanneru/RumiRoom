<!DOCTYPE html>
<HTML>
	<HEAD>
		<TITLE>HLS</TITLE>

		<META CHARSET="UTF-8">

		<STYLE>
			.VIDEO_PLAYER{
				width: 800px;
				height: 500px;

				overflow: hidden;

				border: solid 1px;
			}

			.VIDEO_PLAYER > .VIEW_PORT{
				background-color: black;

				width: 800px;
				height: 450px;
			}

			.VIDEO_PLAYER > .VIEW_PORT > *{
				position: absolute;

				width: 800px;
				height: 450px;
			}

			.VIDEO_PLAYER > .CONTROLE{
				position: absolute;
				top: calc(500px - 25px);
			}
		</STYLE>
	</HEAD>
	<BODY>
		<DIV CLASS="VIDEO_PLAYER">
			<DIV CLASS="VIEW_PORT">
				<VIDEO ID="VIDEO"></VIDEO>
				<CANVAS ID="ZHIMAKU"></CANVAS>
			</DIV>
			<DIV CLASS="CONTROLE">
				<BUTTON onclick="VIDEO_EL.play();">再生</BUTTON>
				<INPUT TYPE="range" MIN="0" MAX="149" ID="SEEKBAR" STYLE="width: 500px;">
			</DIV>
		</DIV>
	</BODY>
</HTML>
<SCRIPT SRC="./RHL.js"></SCRIPT>
