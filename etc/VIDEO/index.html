<HTML>
	<HEAD>
		<TITLE>るみビデオのテスト</TITLE>
	</HEAD>
	<BODY>
		<VIDEO CLASS="VIDEO" ID="VIDEO" SRC="./失業行進.mp4"></VIDEO>
		<DIV CLASS="SUBTITLE" ID="SUBTITLE">

		</DIV>
		<DIV CLASS="CONT" ID="CONT">
			<BUTTON onclick="VIDEO.play()">再生</BUTTON>
			<INPUT TYPE="RANGE" CLASS="SEEK_BAR" ID="SEEK_BAR" MIN="0" MAX="100" VALUE="0">
			<DIV CLASS="VALUE_DISPLAY" ID="VALUE_DISPLAY"></DIV>
		</DIV>
	</BODY>
</HTML>

<STYLE>
body{
	margin: 0px;
}
.VIDEO{
	position: absolute;
	top: 0px;
	left: 0px;

	width: 735px;
	height: 400px;

	border: solid 1px;
}

.SUBTITLE{
	position: absolute;
	top: 0px;
	left: 0px;

	width: 735px;
	height: 400px;

	text-align: center;
}

.SUBTITLE > DIV{
	position: absolute;
	bottom: 0;
	left: 50%;
	transform: translateX(-50%);

	background-color: rgba(0, 0, 0, 0.5);
	color: white;

	min-width: 10px;
	width: fit-content;
}


.CONT{
	position: absolute;
	top: 450px;
	left: 0px;

	width: 100%;
}
</STYLE>

<!--AI作を改造-->
<SCRIPT>
// JavaScript
const VIDEO = document.getElementById('VIDEO');
const SUBTITLE_DIV = document.getElementById('SUBTITLE');
let SUBTITLES = [];

window.addEventListener("load", (e)=>{
	let ajax = new XMLHttpRequest();
	ajax.open("GET", "./subtitles.json");
	ajax.addEventListener("load", (e)=>{
		SUBTITLES = JSON.parse(ajax.responseText);
		VIDEO.addEventListener('timeupdate', showSubtitle);
	});
	ajax.send()
});

function showSubtitle() {
	const CT = VIDEO.currentTime;
	const subtitle = SUBTITLES.find(subtitle => CT >= subtitle.START && CT < subtitle.START + subtitle.DUR);
	if(subtitle){
		SUBTITLE_DIV.innerHTML = "<DIV>" + subtitle.TEXT.replace(/\n/g, "<BR>"); + "</DIV>";
	}else{
		SUBTITLE_DIV.innerHTML = '';
	}
}

</SCRIPT>

<!--Controller-->
<STYLE>
.SEEK_BAR {
	-webkit-appearance: none;
	appearance: none;
	width: 100%;
	height: 5px;
	border-radius: 0px;
	background-color: rgb(222, 222, 222);
	outline: none;
}
.SEEK_BAR::-webkit-slider-thumb,.SEEK_BAR::-moz-range-thumb{
	-webkit-appearance: none;
	appearance: none;
	width: 5px;
	height: 10px;
	border-radius: 0;
	border-width: 0px;
	background-color: #ff0000;
	cursor: pointer;
	transform: rotate(0deg)
}
</STYLE>

<SCRIPT>
	let SEEK_BAR = document.getElementById("SEEK_BAR");//RANGEをここに
	let VALUE_DISPLAY = document.getElementById("VALUE_DISPLAY");

	//シークバーの値が変わった時にここが実行される(らしい)
	SEEK_BAR.addEventListener("input", function() {
		SEEK_BAR_UPDATE();

		VIDEO.currentTime = (SEEK_BAR.value / 100) * VIDEO.duration;
	});

	//ページ読み込み完了時にここが実行される
	window.addEventListener("load", (e)=>{
		SEEK_BAR_UPDATE();
	});

	VIDEO.addEventListener('timeupdate', (e)=>{
		//currentTimeを取得する
		const CT = VIDEO.currentTime;

		//時間を計算する
		const VIDEO_H = Math.floor(CT / 3600);
		//分数を計算する
		const VIDEO_M = Math.floor(CT / 60);
		//秒数を計算する
		const VIDEO_S = Math.floor(CT % 60);

		VALUE_DISPLAY.innerHTML = VIDEO_H + ":" + VIDEO_M + "." + VIDEO_S;

		SEEK_BAR.value = (VIDEO.currentTime / VIDEO.duration) * 100;
		SEEK_BAR_UPDATE();
	});

	//シークバーをアップデートする関数
	function SEEK_BAR_UPDATE(){
		const VALUE = (SEEK_BAR.value - SEEK_BAR.min) / (SEEK_BAR.max - SEEK_BAR.min) * 100;//シークバーの値(0～100)
		SEEK_BAR.style.background = `linear-gradient(to right, #ff0000 0%, #ff0000 ${VALUE}%, #ddd ${VALUE}%, #ddd 100%)`;//シークバーの背景色(ここでYoutubeとかでよくあるあれをしている)
	}
</SCRIPT>
