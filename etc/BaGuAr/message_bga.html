<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=0.5">

  <script src="https://kit.fontawesome.com/065f48408c.js" crossorigin="anonymous"></script>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Electrolize&family=Kaushan+Script&family=M+PLUS+Rounded+1c:wght@100;500;800&family=Playpen+Sans:wght@100;300;500&family=Ubuntu:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .font-badscript { font-family: 'Bad Script', cursive; }
    .font-electrolize { font-family: 'Electrolize', sans-serif; }
    .font-kaushanscript { font-family: 'Kaushan Script', cursive; }
    .font-mplusrounded1c { font-family: 'M PLUS Rounded 1c', sans-serif; }
    .font-playpensans { font-family: 'Playpen Sans', cursive; }
    .font-ubuntu { font-family: 'Ubuntu', sans-serif; }
  </style>
</head>
<body class="h-screen w-screen bg-stone-50 font-light font-mplusrounded1c text-lg flex flex-col">
  
  <div class="p-16">
    <p class="text-7xl font-electrolize">RumiFlare</p>
    <p class="text-2xl font-mplusrounded1c">Something went wrong while establishing connection to rumiserver.com</p>
  </div>

  <div class="h-[25rem] w-full bg-stone-300 text-stone-800 absolute top-1/2 -translate-y-1/2">
    <div class="h-full w-full flex text-center items-center justify-center gap-28">
      <div>
        <i class="fa-brands fa-chrome text-9xl mb-5"></i>
        <p>Your Browser</p>
        <p class="text-green-500">Working</p>
      </div>
      <div>
        <i class="fa-solid fa-network-wired text-9xl mb-5"></i>
        <p>RumisanFlare</p>
        <p class="text-green-500">Working</p>
      </div>
      <div class="h-full flex flex-col justify-center relative">
        <i class="fa-solid fa-server text-9xl mb-5"></i>
        <p>Origin Server</p>
        <p class="text-red-500">Offline</p>

        <div class="left-1/2 -translate-x-1/2 bottom-0 translate-y-1/2 absolute">
          <div class="-rotate-45 h-24 w-24 bg-stone-50 ">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-auto mb-16 pl-16">
    <p class="text-5xl">What can I do?</p>
    <p class="text-xl">Please comeback in few miniutes later, or if this not reslove contact to administrator of rumiserver.com.</p>
  </div>

</body>
</html>
